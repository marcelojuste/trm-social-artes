# ============================================================
# pipeline.yml — o despertador do exército trm-social
#
# Roda NESTE repo público (minutos ilimitados e gratuitos), mas o
# código dos agentes vem do repo PRIVADO trm-social, baixado na hora
# com o PRIVATE_REPO_TOKEN. Nada do código privado fica público.
#
# Fluxo: gerar → aprovar (Telegram) → sincronizar artes → publicar
#        no Instagram → salvar estado no repo privado.
# ============================================================
name: Pipeline de posts

on:
  schedule:
    # Cron é sempre em UTC. Brasília = UTC-3:
    #   14:00 UTC = 11:00 BRT (rodada principal)
    #   20:00 UTC = 17:00 BRT (segunda chance: aprovações atrasadas
    #                          e posts de data que não podem esperar)
    - cron: "0 14 * * *"
    - cron: "0 20 * * *"
  # Botão "Run workflow" na aba Actions, para rodar na mão quando quiser
  workflow_dispatch:
    inputs:
      forcar:
        description: "Forçar geração de post (ignora o intervalo mínimo entre posts)"
        type: boolean
        default: false

# O passo "Enviar artes" faz push NESTE repo usando o token padrão do
# Actions — que por padrão é somente-leitura. Aqui liberamos a escrita.
permissions:
  contents: write

# Nunca duas execuções ao mesmo tempo (evita post duplicado)
concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      # ---- 1. Os dois repositórios, lado a lado ----
      - name: Baixar este repositório (artes)
        uses: actions/checkout@v4
        with:
          path: artes

      - name: Baixar o código (repositório privado)
        uses: actions/checkout@v4
        with:
          repository: marcelojuste/trm-social
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: codigo

      # ---- 2. Preparar Python e dependências ----
      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: codigo/requirements.txt

      - name: Instalar dependências
        working-directory: codigo
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      # ---- 3. Gerar o post (a trava de cadência decide se é dia) ----
      - name: Gerar post
        working-directory: codigo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # No disparo manual com "forcar" marcado, ignora a trava de cadência
        run: python -m src.main ${{ inputs.forcar && '--forcar' || '' }}

      # ---- 4. Aprovação humana via Telegram ----
      # Reenvia pendentes, processa cliques da fila e espera novos
      # (janela em config.yaml → aprovacao.tempo_maximo_minutos).
      # O Redator entra em ação se você pedir edição, por isso a
      # chave do Gemini também é necessária aqui.
      - name: Aprovação via Telegram
        working-directory: codigo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.aprovacao

      # ---- 5. Artes aprovadas viram URL pública (este repo) ----
      - name: Sincronizar artes aprovadas
        run: python codigo/scripts/sincronizar_artes.py artes

      - name: Enviar artes para o repositório público
        working-directory: artes
        run: |
          git config user.name "trm-social-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Artes aprovadas"
          git push

      # ---- 6. Publicar no Instagram ----
      - name: Publicar no Instagram
        working-directory: codigo
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.publicar

      # ---- 7. Salvar o estado no repositório privado ----
      # (histórico + status dos posts: é a memória entre execuções)
      - name: Salvar estado
        working-directory: codigo
        run: |
          git config user.name "trm-social-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data out
          git diff --cached --quiet || git commit -m "Atualiza estado dos posts"
          git push
